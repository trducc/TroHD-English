server.port=9091

# 1. KẾT NỐI MYSQL (Sếp dùng cái này để không bao giờ mất dữ liệu nữa)
spring.datasource.url=jdbc:mysql://localhost:3306/thuctapcoso?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. CẤU HÌNH HIBERNATE (Quan trọng: dùng update để giữ dữ liệu cũ)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# 3. TẮT TỰ ĐỘNG NẠP DATA (Vì sếp nạp bằng tia sét ở Workbench rồi)
spring.sql.init.enabled=false